# Docker Compose configuration for local development database
# This runs PostgreSQL in a container for safe local development

services:
  # PostgreSQL database service
  postgres:
    image: postgres:16-alpine  # Lightweight PostgreSQL 16 image
    container_name: bookshelf-postgres-dev
    restart: unless-stopped  # Automatically restart unless manually stopped

    ports:
      - "5432:5432"  # Expose PostgreSQL on localhost:5432

    environment:
      # Database credentials (these are for LOCAL DEV ONLY - not sensitive)
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bookshelf_dev

    volumes:
      # Persist data in a named volume (survives container restarts)
      - bookshelf-postgres-data:/var/lib/postgresql/data

    healthcheck:
      # Check if database is ready to accept connections
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

# Named volume for persistent data storage
volumes:
  bookshelf-postgres-data:
    name: bookshelf-postgres-data
